name: Ajeto
options:
  bundleIdPrefix: nl.tomderoos
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.10"
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_USER_SCRIPT_SANDBOXING: YES
targets:
  Ajeto:
    type: application
    platform: iOS
    sources:
      - path: Ajeto
    info:
      path: Ajeto/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Ajeto
        NSCameraUsageDescription: Om foto's van je klussen te maken.
        NSPhotoLibraryUsageDescription: Om foto's uit je bibliotheek toe te voegen bij klussen.
        UIAppFonts:
          - SpaceGrotesk.ttf
          - HankenGrotesk.ttf
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: nl.tomderoos.Ajeto.klus
            UTTypeDescription: Ajeto klus
            UTTypeConformsTo:
              - public.data
              - public.content
            UTTypeTagSpecification:
              public.filename-extension:
                - ajeto
              public.mime-type:
                - application/x-ajeto-klus
        CFBundleDocumentTypes:
          - CFBundleTypeName: Ajeto klus
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes:
              - nl.tomderoos.Ajeto.klus
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: nl.tomderoos.Ajeto
        PRODUCT_NAME: Ajeto
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_TEAM: 7K85BU47R9
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
        CODE_SIGNING_ALLOWED: YES
